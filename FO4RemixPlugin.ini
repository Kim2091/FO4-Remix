; FO4RemixPlugin.ini -- reference configuration (shipped defaults).
; Booleans are 0/1. Distances are game units (4096 = 1 cell, ~58 m). Deep rationale for each knob lives in the source next to its consumer; comments here are the short version.

[SemanticCapture]
; Master switch for the GetRenderPasses capture hook. Everything downstream (meshes, materials, lights) depends on it.
Enabled=1
; Frames an unresolved drawable stays retry-eligible after its last engine fire. Short windows leave the player's own cell empty after save-loads (the engine fires destination cells during the load screen, then caches).
ResolveRetryWindowFrames=600

[Culling]
; Textures/materials un-drawn longer than their grace (frames) are reclaimed once their refcounts hit zero. Grace tightens 8x automatically under VRAM pressure (see ForceEvictViewPct).
TextureLRUGraceFrames=600
MaterialLRUGraceFrames=600
TextureLRUSweepPeriod=60
; Soft cap (MiB) on Remix material-texture VRAM; 0 = disabled (superseded by the pressure system below, kept as an independent lever).
TextureBudgetMiB=0
; Stop drawing a worldspace LOD chunk once the engine hasn't fired it for N frames (it hid the chunk when its cells attached at full detail). 0 = off.
LodChunkStaleFrames=30
; Skip a LOD chunk when its distance exceeds extent * ratio (angular-size rule: fine near-ring chunks drop at range, coarse horizon chunks survive). 0 = off. Raise if you see mid-distance holes; lower for GPU savings.
LodChunkFarExtentRatio=0
; Tiered behind-camera parking: parked = Remix resources released, entry kept + resolver-skipped, restored automatically when it re-enters the view (nearest-first). Prevents the cross-country VRAM pileup (13.5/14.7 GiB -> 1 fps) that TTLs never catch.
; Tier A: at this % of the driver VRAM budget, park drawables behind the camera and farther than ForceEvictBehindDistance, furthest first; un-parks when usage drops 5 points below. 60 field-validated (steady fps, no visible downside). 0 = off.
ForceEvictViewPct=60
ForceEvictBehindDistance=8000
; Tier B: behind + beyond this distance parks UNCONDITIONALLY (no VRAM gate) -- ultra-far restores are rare and invisible. 0 = off.
ForceEvictAlwaysBehindDistance=40000
; Tier C, OPTIONAL (default off): LOD chunks behind the camera beyond this distance park unconditionally. Big VRAM saver for low-end cards, but the horizon visibly re-streams on a turn-around. Recommended on-value: 12000.
ForceEvictLodBehindDistance=0
; Fallback: at this %, hard-evict the oldest-seen drawables regardless of view. Safety net above the tiers. 0 = off.
ForceEvictVramPct=88
; Per-sweep cap across park + evict (sweeps run every 60 frames).
ForceEvictPerSweep=512
; Frustum culling: skip drawing objects fully outside the (margin-expanded) view frustum -- smaller TLAS, fewer BLAS builds. Handles stay warm (nothing released, unlike parking), so re-entry on a camera turn is instant.
FrustumCull=1
; Everything within this radius of the camera renders regardless of view direction, so nearby off-screen geometry still shows in ray-traced shadows/reflections/GI. Raise if you notice missing reflections of close behind-camera objects; lower for more TLAS savings. 8192 = ~2 cells.
FrustumKeepRadius=8192
; Guard band (degrees) added to each frustum half-angle before culling; re-entry uses half of it (hysteresis against edge flapping). Raise if anything pops at the screen edge.
FrustumFovMarginDeg=12
; Also frustum-cull worldspace LOD chunks. Default off: the distant horizon behind you is what water/window reflections show, and LodChunkFarExtentRatio already bounds LOD cost. Turn on for max savings if you don't care about behind-camera horizon reflections.
FrustumCullLodChunks=0

[Performance]
; Batch identical drawables into one DrawInstance via GPU instancing.
GpuInstancing=1
; Mirrored-instance base-record winding fix for batched draws.
BatchedMirrorBase=1
; Remix render-thread fps target; the thread sleeps the unused remainder. 0 = uncapped (yield-only).
RemixMaxFPS=120
; Per-frame budget (ms) for capturing newly-loaded geometry on the game render thread. Lower = smoother streaming but slower pop-in. 0 = unbounded.
ResolveBudgetMs=3.0
; Cap (MiB) on Remix texture/mesh uploads per resolve tick.
MaxUploadMiBPerTick=48
; Max concurrent async texture readbacks (pop-in speed after a load; staging VRAM is transient).
MaxPendingTextureReadbacks=256
; Background texture-decode pool: percent of logical cores, plus an absolute cap (BC decode is bandwidth-bound; >4 workers measured slower than 4).
DecodeWorkerPercent=25
DecodeWorkerMax=4
; Off-thread the mesh parse + merge-chunk bake (2-thread pool): kills the 35ms single-item resolve hitches on giant precombine merges. 0 = legacy inline parse.
AsyncMeshParse=1
; Soft budget (MiB) for the CPU-side decoded-texture cache; in-use entries are never evicted. 0 = unbounded.
CpuTextureCacheMiB=1024
; Stop forwarding the game's own raster draws to the GPU (capture still works; UI phase + occlusion queries still execute). Frees the VRAM and GPU time the raster path burns. Wants HudOverlayEnabled=1.
SuppressGameRaster=0
; Destroy released Remix handles only during load screens (mid-gameplay destroy/create interleaving is a CreateMesh-AV suspect). 0 = 30-frame cadence.
DeferHandleDestroyToLoad=1

[Materials]
; Spec-gloss -> metal-rough conversion for FO4 envmap materials (without it, metals render pure black: their vanilla shine is specular+envmap, which the path tracer doesn't replicate).
MetalConversionEnabled=1
; Derived metallic/roughness constants for classified metals. Both OFF by verification: metallic fights the albedo floor, and FO4 authors fSmoothness=1.0 nearly everywhere (deriving roughness turns the whole envmap class into chrome).
MetalMetallicEnabled=0
MetalRoughnessEnabled=0
; metallicConstant at fSmoothness=1.0 (only used when MetalMetallicEnabled).
MetalMetallic=0.85
; Minimum diffuse luminance for metals -- darker pixels are lifted with hue preserved so black metals aren't stuck black (F0 comes from albedo).
MetalAlbedoLumFloor=0.25
; Roughness floor for metals so nothing becomes a literal mirror.
MetalMinRoughness=0.15
; Per-pixel roughness from _s.dds smoothness maps; the floor prevents "very smooth" authoring from becoming path-traced mirrors.
RoughnessMapsEnabled=1
RoughnessMapFloor=0.15
; Re-resolve objects once the engine streams a sharper mip in (fixes distance-captured blurry textures). Costs release/re-resolve lag spikes while moving. 0 = capture-once.
TextureUpgradeOnApproach=0
; Longest texture edge uploaded to Remix (0 = uncapped). Guardrail for 4K texture mods (uncapped: 11+ GiB in the texture pool = paging stalls).
MaxTextureDimension=2048
; On-disk decoded-texture cache (skips BC re-decode across sessions).
DiskTextureCache=1
DiskTextureCacheGiB=8

[Lights]
Enabled=1
; Radiance multiplier.
Intensity=1.0
; Emitter sphere radius multiplier.
RadiusMultiplier=1.0
; 0.0 = white light, 1.0 = full game color.
ColorStrength=1.0
; Update changed lights in place (same handle -> RTXDI reservoirs survive, no light boiling). 0 = creation-time parameters until the light unloads.
LiveUpdate=1
; Lights within this range of the camera ignore the view model, so a light at arm's reach can't make the arms shadow the whole scene. 0 = off.
NearCameraIgnoreViewModelUnits=150

[Emissive]
GlowMapsEnabled=1
EmissiveColorEnabled=1
Intensity=1.0
LogEmissive=0

[Skinning]
Enabled=1

[ViewModel]
; Render the 1st-person arms/weapon/Pip-Boy, re-anchored to the live camera.
Enabled=1
; Correct the NIF camera-axis convention of the 1P Camera bone (0 = arms render twisted 90 degrees).
BoneConventionFix=1
; Dedicated VIEW_MODEL camera at the game's own 1st-person FOV, so the arms don't distort with world-FOV changes (needs a 2026-07-18+ fork runtime; older runtimes safely ignore it).
SeparateCamera=1
; Manual vertical-FOV override for the view-model camera, degrees (0 = auto).
FovOverride=0
; Tag 1P draws with the VIEW_MODEL instance category.
CategoryTag=1
; Live Pip-Boy screen refresh period, game frames (0 = off). Lower = smoother screen, more upload traffic (~2.4MB/refresh).
ScreenRefreshFrames=12
; Route the captured Pip-Boy UI layer onto the 1P screen mesh as its diffuse+emissive; tint matches vanilla fPipboyEffectColor.
PipboyScreenFeed=1
PipboyScreenTintR=0.08
PipboyScreenTintG=1.00
PipboyScreenTintB=0.09
PipboyScreenEmissiveScale=1.5

[Overlay]
; Composite the game's DX11 UI over the path-traced image. Requires a runtime with the rtx_fork_overlay layout fix (dxvk-remix 8990aed+).
HudOverlayEnabled=1
; Capture ALL Scaleform UI layers (HUD, main menu, Pip-Boy, terminals) in render order. 0 = legacy single-RT capture (only VATS + HUD show).
MultiLayerCapture=1
; Pip-Boy UI panel size while the screen feed is live, fraction of screen height (the physical screen mesh is unreadably small). 0 = mesh only.
PipboyPanelHeightFrac=0.55
; 0 = keep the game's raw-input registration intact (the legacy RIDEV_REMOVE workaround breaks game keyboard input).
RestoreLegacyInput=0

[Camera]
; Read the live NiCamera frustum (exact FOV/aspect/near/far, tracks ADS zoom). 0 = legacy raw fDefaultWorldFOV pass-through (renders too wide).
FovFromFrustum=1

[Precombines]
; One Remix drawable per hardware instance of BSMergeInstancedTriShape.
MergeInstanceExpansion=1
; Instance-record decode variant (RowVector, Conjugate) -- validated (1,0).
MergeInstanceRowVector=1
MergeInstanceConjugate=0
; Draw-capture assisted merge-instance identity.
MergeInstanceDrawCapture=1
; Render merge-expanded geometry double-sided (vanilla-faithful: baked kit winding is inconsistent). 0 = single-sided experiment, a perf win if it holds up.
MergeTwoSided=1

[Window]
; Glue the Remix window over the game window as a borderless overlay with menu-driven focus handoff. 0 = free-floating resizable window.
OverlayMode=1
; Virtual-key code toggling the Remix dev menu (hex or decimal; 0 = off).
MenuHotkey=0x77

[Logging]
LogShapeInfo=0
LogLargeShapes=1
LogRejections=1
LogTextures=0
LogLights=0
LogBoneDiag=1

[Diagnostics]
Enabled=1
