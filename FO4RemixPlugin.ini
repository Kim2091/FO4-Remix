[Logging]
; Log shape name, vertex format, and flags for every extracted shape
LogShapeInfo=0
; Log shapes with extent > 500
LogLargeShapes=1
; Log rejected meshes (NaN positions, excessive extent, etc.)
LogRejections=1
; Log extracted texture info (diffuse, normal, emissive)
LogTextures=0
; Log extracted light info
LogLights=0
; One-shot bone matrix diagnostic (dumps bone 0 raw/computed/swapped matrices every ~120 frames)
LogBoneDiag=1

[Camera]
; 1 (default) = read the live NiCamera view frustum for the Remix camera:
;     exact vertical FOV + aspect ratio + near/far, tracks aim-down-sights
;     zoom and FOV mods per frame. Falls back to converting fDefaultWorldFOV
;     (a horizontal-convention value) to vertical if the frustum is
;     unavailable.
; 0 = legacy behavior: pass fDefaultWorldFOV through raw. The runtime treats
;     that value as VERTICAL FOV, so an 80-degree setting rendered ~112
;     degrees horizontal -- much wider than the game.
FovFromFrustum=1

[Overlay]
; 0 = skip the keyboard RIDEV_REMOVE workaround (the workaround was wiping
;     the game's own raw-input registration; default-true breaks game keyboard)
RestoreLegacyInput=0
; HUD/UI passthrough: capture the game's DX11 UI render target and composite
; it over the path-traced image via DrawScreenOverlay. REQUIRES a runtime
; with the rtx_fork_overlay.cpp layout fix (dxvk-remix 8990aed+); older
; runtimes tripped assert(dstLayout != VK_IMAGE_LAYOUT_UNDEFINED) at
; dxvk_barrier.cpp:64 on the first HUD upload. The locally-built runtime has
; the fix. Cost: one CopyResource + blocking Map on the game render thread
; per UI frame. Set 0 to disable (e.g. when measuring perf).
HudOverlayEnabled=1

[SemanticCapture]
; Install the BSLightingShaderProperty event-capture hook (geometry capture)
Enabled=1
; Frames an unresolved drawable stays retry-eligible after the engine last
; fired for it. Save-loads fire the destination cell during the load screen
; before its resources are extractable; the engine caches render passes and
; never re-fires, so a short window left the player's own cell empty.
ResolveRetryWindowFrames=600

[Materials]
; Spec-gloss -> metal-rough conversion for FO4 environment-mapped materials.
; FO4 metals have near-black albedo (vanilla shine = specular + envmap, which
; the path tracer doesn't replicate), so without conversion kType_Envmap
; objects (power-armor stands, picket-fence LODs, street lamps) render as
; pure black.
MetalConversionEnabled=1
; Apply the derived metallicConstant to classified metals (0/1). Default
; off: Remix's metal BRDF takes F0 from albedo, so floor-lifted albedo x
; high metallic still read near-black in-game -- the metallic constant
; fights the luminance floor. Off = legacy metallicConstant 0.
MetalMetallicEnabled=0
; Apply the derived roughnessConstant (1 - fSmoothness) to classified
; metals (0/1). Off = legacy roughnessConstant 0.8. KEEP OFF: FO4 authors
; fSmoothness as a multiplier over the _s.dds map -- it reads 1.0 on
; virtually every material, so this derivation turns the whole envmap
; class into chrome (2026-07-07 vault verification). Per-pixel roughness
; comes from the _s.dds map itself; this constant only ever applies to
; materials with no _s map.
MetalRoughnessEnabled=0
; metallicConstant at fSmoothness=1.0 (only used when MetalMetallicEnabled);
; scales down with authored smoothness (fSmoothness=0 gives 0.2x of this) so
; wetness-style envmaps on bark/wood stay mostly dielectric while real
; metals go metallic.
MetalMetallic=0.85
; Minimum diffuse luminance (0..1) for classified metals. Pixels darker than
; this are lifted with their hue preserved (rust stays rust); brighter pixels
; are untouched. Remix's metal BRDF takes F0 from albedo, so a floor of 0
; would leave black metals black no matter the metallic constant.
MetalAlbedoLumFloor=0.25
; Roughness floor for metals (1 - fSmoothness clamps here) so nothing
; becomes a literal mirror
MetalMinRoughness=0.15
; Extract per-pixel roughness from _s.dds smoothness maps (restored
; 2026-07-07). Off = every opaque material falls back to the flat
; roughnessConstant (0.8, matte).
RoughnessMapsEnabled=1
; Floor (0..1) on the per-pixel roughness derived from _s.dds smoothness
; maps. Prevents "very smooth" authoring from becoming literal
; path-traced mirrors; decals clamp at >= 0.3 regardless.
RoughnessMapFloor=0.15
; Re-capture textures at full resolution as you approach (0/1, default 0).
; FO4 streams textures in progressively, so an object first seen at distance
; is captured at a reduced mip and the texture cache locks that blurry
; version for the session (soft/"blobby" surfaces, washed-out detail, flat
; NPC skin). When ON, submitted objects are re-resolved once the engine has
; streamed a sharper mip in, so their textures sharpen up close. Costs: the
; release+re-resolve churn causes intermittent lag spikes while moving, and
; each upgrade briefly re-submits the object. DEFAULT OFF for smoothness;
; enable if you prefer maximum sharpness over frametime stability.
TextureUpgradeOnApproach=0
; Longest texture edge extracted and uploaded to Remix (default 2048,
; 0 = uncapped). Larger residents upload from the first mip at or under the
; cap -- the engine's chain already has it, nothing is resampled. Guardrail
; for texture mods: 4K packs otherwise put ~4x the bytes in the Remix
; material-texture pool (11+ GiB observed = adapter-budget paging = heavy
; frame stalls) plus 4x the readback/decode cost. Vanilla content tops out
; at 2048, so the default changes nothing without mods. Raise to 4096 (or 0)
; only with VRAM headroom to spare.
MaxTextureDimension=2048

[Culling]
; Frames a worldspace LOD chunk can go un-fired before it stops drawing
; (0 = disabled). The engine hides LOD chunks when their cells attach at
; full detail; a chunk that stopped firing GetRenderPasses is one the
; engine stopped rendering, and drawing it anyway overlays the low-poly
; shell on the streamed-in buildings. Re-appears within a frame or two
; when the engine renders it again. Ignored while the 3D scene is not
; firing at all (pause/main menu).
LodChunkStaleFrames=30

[Performance]
; Batch identical drawables into one DrawInstance via GPU instancing (0/1)
GpuInstancing=1
; Remix render-thread frame-rate target. The thread sleeps only the unused
; remainder of each frame's budget; 0 = uncapped (yield-only).
RemixMaxFPS=120
; Max concurrent async texture readbacks. Sets scene pop-in speed after a
; load; staging VRAM is transient (~1.4MB per 1K texture in flight).
MaxPendingTextureReadbacks=256
; Per-frame time budget (ms) for capturing newly-loaded geometry (mesh parse
; + texture decode + Remix upload, all on the game render thread). When a
; cell attaches, hundreds of objects become capturable in the same frame;
; without a budget that burst lands as one long frame (the "hitching when
; moving / new geometry loads" symptom -- measured 12.6ms/frame average
; during streaming, spikes far higher). The backlog carries over to the next
; frames, so lower = smoother but slower pop-in, higher = faster pop-in but
; more hitching. 0 = unbounded (legacy). Texture upgrades
; (TextureUpgradeOnApproach) share this budget and yield to new geometry.
ResolveBudgetMs=3.0
; Percentage of logical CPU cores used for background texture decoding
; (BC decompression + normal/roughness/tint conversion off the game render
; thread). Higher = textures finish faster during streaming; the workers run
; at below-normal priority so they yield to the game when the CPU is busy.
; Worker count = cores * percent / 100, clamped to at least 1 and at most
; cores - 1. Default 25 (2 workers on 8 cores, 4 on 16).
DecodeWorkerPercent=25
; Absolute cap on the decode pool regardless of percentage (0 = uncapped).
; BC decode is memory-bandwidth-bound: past ~4 threads the workers fight
; each other and the game for DRAM instead of adding throughput (8 workers
; measured slower than 4 on a 32-core machine). Default 4.
DecodeWorkerMax=4
; SOFT byte budget (MiB) for the CPU-side decoded-texture cache. Decoded
; RGBA mip chains are large (~22 MiB per 2048^2 texture) and used to
; accumulate without bound for the whole session. Past the budget, entries
; untouched for ~10s are evicted oldest-first; entries in active use are
; NEVER evicted even over budget (evicting the live working set causes a
; re-decode feedback loop). 0 = unbounded (legacy).
CpuTextureCacheMiB=1024
; Stop forwarding the game's own raster draw calls to the GPU (the engine
; still runs its full CPU render loop, so capture, streaming, and readbacks
; keep working). Frees the VRAM the game's raster path pins -- with texture
; mods installed the game and the path tracer otherwise fight over the
; budget -- and returns the raster GPU time to Remix. Still executed: the
; frame's UI PHASE (everything from the first UI render-target bind to the
; end of the frame -- Scaleform glyph atlases, menu filters, the backbuffer
; composite, so menus/HUD render fully and the game window keeps live UI)
; and draws inside occlusion-query scopes. Scene, shadow, and post passes
; all run before the UI phase and are suppressed. Wants HudOverlayEnabled=1.
; Watch the [VRAM] log lines for the before/after. Default 0.
SuppressGameRaster=0

[Precombines]
; Render merge-expanded precombine geometry double-sided (default 1, the
; vanilla-faithful choice -- baked kit content winding is inconsistent).
; Set 0 for the single-sided experiment: the inside-out evidence that
; forced double-siding predated the BatchedMirrorBase fix, so single-sided
; (with the per-instance mirrored-record winding flip re-enabled) may now
; be correct, and it is a real path-tracing perf win if it holds up.
MergeTwoSided=1

[Lights]
; Master toggle for all extracted lights (0 = off, 1 = on)
Enabled=1
; Multiplier for light radiance/brightness
Intensity=1.0
; Multiplier for light emitter sphere radius
RadiusMultiplier=1.0
; Color saturation strength: 0.0 = white, 1.0 = full game color
ColorStrength=1.0
