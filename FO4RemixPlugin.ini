[Logging]
; Log shape name, vertex format, and flags for every extracted shape
LogShapeInfo=0
; Log shapes with extent > 500
LogLargeShapes=1
; Log rejected meshes (NaN positions, excessive extent, etc.)
LogRejections=1
; Log extracted texture info (diffuse, normal, roughness)
LogTextures=0
; Log extracted light info
LogLights=0

[Limits]
; Reject shapes with local extent larger than this value
MaxExtent=10000

[Lights]
; Master toggle for all extracted lights (0 = off, 1 = on)
Enabled=1
; Multiplier for light radiance/brightness
Intensity=1.0
; Multiplier for light emitter sphere radius
RadiusMultiplier=1.0
; Color saturation strength: 0.0 = white, 1.0 = full game color
ColorStrength=1.0
